[build]
builder_version = "2.2.0"

[build.railpack]
install = "composer install --no-dev --optimize-autoloader"

build = """
npm install && \\
npm run build
"""

postBuild = """
php artisan config:cache && \\
php artisan route:cache
"""

[deploy]
start_command = "php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheck_path = "/"
healthcheck_timeout = 100
restart_policy_type = "ON_FAILURE"
restart_policy_max_retries = 3

[environments.production]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "errorlog"
SESSION_DRIVER = "cookie"
SESSION_SECURE_COOKIES = "false"
DB_CONNECTION = "sqlite"
DB_DATABASE = "/app/data/database.sqlite"

[watch]
ignorePaths = [
    ".git",
    "node_modules",
    "vendor",
    ".railway"
]