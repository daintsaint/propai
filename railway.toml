# Railway deployment configuration for PropAI
# Laravel 11 + PHP 8.3 + SQLite

"$schema" = "https://railway.app/railway.schema.json"

[build]
builder = "RAILPACK"

# Build configuration for Laravel 11
[build.railpack]
# Install dependencies
preInstall = "apt-get update && apt-get install -y git unzip curl"

# Composer install
install = "composer install --no-dev --optimize-autoloader"

# Build frontend assets if using Vite/Mix
build = """
npm install && \
npm run build
"""

# Post-build: Laravel optimization
postBuild = """
php artisan config:cache && \
php artisan route:cache && \
php artisan view:cache
"""

[deploy]
# Start Laravel development server for Railway
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Production environment configuration
[environments.production]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "errorlog"
SESSION_DRIVER = "cookie"
SESSION_SECURE_COOKIES = "false"
DB_CONNECTION = "sqlite"
DB_DATABASE = "/app/data/database.sqlite"

# Create persistent data directory
[watch]
ignorePaths = [
    ".git",
    "node_modules",
    "vendor",
    ".railway"
]